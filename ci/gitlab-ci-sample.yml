stages:
  - assess

variables:
  VULBOX_API: "https://vulbox.example.com"

security-assessment:
  stage: assess
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      RUN_ID=$(curl -sf -X POST "$VULBOX_API/runs" \
        -H "Content-Type: application/json" \
        -d "{\"project_name\":\"$CI_PROJECT_NAME\",\"repo_url\":\"$CI_PROJECT_URL\",\"branch\":\"$CI_COMMIT_REF_NAME\",\"commit_sha\":\"$CI_COMMIT_SHA\",\"consent_granted\":true}" \
        | jq -r .id)
      echo "Assessment run ID: $RUN_ID"

      for i in $(seq 1 60); do
        STATUS=$(curl -sf "$VULBOX_API/runs/$RUN_ID" | jq -r .status)
        echo "Status: $STATUS"
        if [ "$STATUS" = "COMPLETE" ] || [ "$STATUS" = "FAILED" ]; then break; fi
        sleep 10
      done

      curl -sf "$VULBOX_API/reports/$RUN_ID/export?format=json" > vulbox-report.json
  artifacts:
    paths:
      - vulbox-report.json
    expire_in: 30 days
  only:
    - main
    - merge_requests
