  # T1082 — System Information Discovery (catch-all when no CVE-specific signal)
  # Intentionally none — used as fallback only.

  # T1574 — Hijack Execution Flow (DLL / library hijacks, library path tampering)
  - cve: CVE-2023-4911         # glibc Looney Tunables
    technique: T1574
  - cve: CVE-2018-1000001      # glibc realpath buffer underflow
    technique: T1574

# --------------------------------------------------------------------------
# Heuristic fallbacks. When none of the above CVEs match, the adapter
# inspects the Trivy findings and adds techniques whose preconditions look
# satisfied. Each rule fires independently; order in the resulting queue is
# the order listed here.
#
#   match.severity_min  — fires only if at least one finding has severity ≥ N
#                         (critical=4, high=3, medium=2, low=1)
#   match.keywords      — fires if any finding's package_name OR description
#                         (case-insensitive) contains any keyword
#   match.always        — always fires (use sparingly)
#
# Used by ARTAdapter.build_queue when CVE-driven matches < 2.
fallbacks:

  - technique: T1082
    match: { always: true }
    notes: Discovery — establishes the baseline (every image yields at least one positive on /etc enumeration).

  - technique: T1059.004
    match:
      keywords: [bash, sh, dash, busybox, php, python, perl, ruby, node, apache, nginx]
    notes: Shell-availability is the precondition for command execution; fires on any image with an interpreter package.

  - technique: T1068
    match:
      severity_min: high
      keywords: [kernel, sudo, polkit, pkexec, util-linux, glibc, libc6]
    notes: Privesc only meaningful when a high-severity package is present.

  - technique: T1611
    match:
      keywords: [runc, containerd, docker, kubelet, kube-, libcap, capsh]
    notes: Container-escape probes are only worth running against container-runtime components.

  - technique: T1190
    match:
      keywords: [apache, nginx, httpd, tomcat, jetty, wildfly, php, fpm, node, express, gunicorn, struts, spring, log4j]
    notes: Public-facing app exploit only relevant for HTTP/web stack images.

  - technique: T1543.002
    match:
      keywords: [systemd, init, openrc, supervisord]
    notes: Persistence via service unit only succeeds where an init system is present.

  - technique: T1552.001
    match:
      severity_min: medium
    notes: Credential-files sweep is cheap and useful on any non-trivial image.
