# CVE → MITRE ATT&CK technique mapping.
#
# Used by app.adapters.art_adapter.ARTAdapter to translate Trivy CVE findings
# into the adversarial techniques worth running against the sandbox. Each
# mapping is a known-exploited or well-documented association between a CVE
# and a primary post-exploitation behaviour, drawn from MITRE ATT&CK technique
# pages and the CISA Known Exploited Vulnerabilities catalogue.
#
# The map is consulted in CVE-priority order: a Trivy finding whose cve_id
# appears here adds the corresponding technique to the front of the ART queue
# and contributes its finding_id to the resulting SecurityMatrixEntry, so the
# downstream remediation engine can correlate the test back to the CVE that
# motivated it.
#
# To extend: add a `cve` (string) and `technique` (MITRE ID); optionally a
# one-line `notes` field documenting the rationale. Keep entries sorted by
# technique to make duplicate-detection by humans easy.

mappings:

  # T1059 / T1059.004 — Command and Scripting Interpreter (Unix Shell)
  - cve: CVE-2014-6271        # Shellshock
    technique: T1059.004
    notes: Bash environment-variable parsing RCE; trivial shell injection.
  - cve: CVE-2021-44228        # Log4Shell
    technique: T1059
    notes: JNDI lookup → RCE in Java applications.
  - cve: CVE-2021-45046        # Log4j follow-up
    technique: T1059
  - cve: CVE-2022-22965        # Spring4Shell
    technique: T1059
    notes: Spring Framework data-binding RCE.
  - cve: CVE-2017-5638         # Apache Struts Jakarta parser RCE
    technique: T1059
  - cve: CVE-2018-11776        # Struts OGNL
    technique: T1059
  - cve: CVE-2022-26134        # Confluence OGNL injection
    technique: T1059
  - cve: CVE-2019-11581        # Atlassian Jira template injection
    technique: T1059
  - cve: CVE-2017-12149        # JBoss Application Server RCE
    technique: T1059
  - cve: CVE-2020-14882        # WebLogic RCE
    technique: T1059
  - cve: CVE-2023-23397        # Outlook NTLM (auth + script context)
    technique: T1059

  # T1068 — Privilege Escalation
