  - cve: CVE-2016-5195         # Dirty COW
    technique: T1068
  - cve: CVE-2017-1000112      # Linux UDP fragmentation privesc
    technique: T1068
  - cve: CVE-2017-7494         # Samba is_known_pipename
    technique: T1068
  - cve: CVE-2021-3156         # sudo Baron Samedit
    technique: T1068
    notes: Heap overflow in sudoedit → root.
  - cve: CVE-2023-32233        # Linux nf_tables UAF
    technique: T1068
  - cve: CVE-2024-1086         # nf_tables double-free
    technique: T1068
  - cve: CVE-2023-2640         # Ubuntu OverlayFS privesc
