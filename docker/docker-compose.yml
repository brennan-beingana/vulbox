version: "3.9"

networks:
  sandbox:
    internal: true  # No outbound internet access for sandbox containers
  app:
    driver: bridge

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    environment:
      - VULBOX_DEV_MODE=true
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    networks:
      - app

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    volumes:
      - ../frontend:/workspace/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - app

  falco:
    image: falcosecurity/falco:0.38.0
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /dev:/host/dev
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - ../data/falco:/var/log/falco
    environment:
      - FALCO_BPF_PROBE=
    networks:
      - app
    profiles:
      - full  # Only starts when: docker compose --profile full up
